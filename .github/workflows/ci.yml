name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          brew install just swiftformat swiftlint xcbeautify || true

      - name: Setup
        run: just setup

      - name: CI checks
        run: just ci
